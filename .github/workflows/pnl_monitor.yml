name: PnL Monitor — Short Put VRP

on:
  schedule:
    - cron: '0 * * * *'   # toutes les heures
  workflow_dispatch:        # déclenchement manuel depuis GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas scipy numpy matplotlib

      - name: Créer positions.json depuis le Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python - <<'EOF'
          import requests, json, os

          token   = os.environ["GIST_TOKEN"]
          gist_id = os.environ["GIST_ID"]

          print(f"Fetching gist: {gist_id}")
          r = requests.get(
              f"https://api.github.com/gists/{gist_id}",
              headers={
                  "Authorization": f"token {token}",
                  "Accept": "application/vnd.github+json",
              },
              timeout=10
          )
          print(f"Status: {r.status_code}")
          data = r.json()

          if "files" not in data:
              print(f"Erreur API: {data.get('message', data)}")
              raise SystemExit(1)

          content = data["files"]["positions.json"]["content"]
          with open("positions.json", "w") as f:
              f.write(content)
          print("positions.json charge depuis le Gist")
          print("Instrument:", json.loads(content).get("open", {}).get("instrument_name", "aucune position"))
          EOF

      - name: Créer .env pour gist_sync
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          echo "GITHUB_TOKEN=$GIST_TOKEN" > .env
          echo "GIST_ID=$GIST_ID" >> .env
          mkdir -p output

      - name: Run PnL monitor
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          echo "GITHUB_TOKEN=$GIST_TOKEN" > .env
          echo "GIST_ID=$GIST_ID" >> .env
          python pnl_monitor.py

      - name: Run Greeks & Hedge check
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          echo "GITHUB_TOKEN=$GIST_TOKEN" > .env
          echo "GIST_ID=$GIST_ID" >> .env
          python greeks_hedge.py --run

      - name: Générer la GitHub Page
        run: python generate_html.py

      - name: Commit pnl_summary.json dans le repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp output/pnl_snap_*.csv /tmp/latest_snap.csv 2>/dev/null || true
          python - <<'EOF'
          import csv, json, glob
          from pathlib import Path

          snapshots = sorted(glob.glob("output/pnl_snap_*.csv"))
          if not snapshots:
              print("Pas de snapshot, skip.")
              raise SystemExit(0)

          with open(snapshots[-1]) as f:
              row = list(csv.DictReader(f))[0]

          summary = {
              "timestamp":           row.get("timestamp"),
              "days_held":           row.get("days_held"),
              "spot":                row.get("spot"),
              "entry_spot":          row.get("entry_spot"),
              "spot_move_pct":       row.get("spot_move_pct"),
              "entry_price_btc":     row.get("entry_price_btc"),
              "current_price_btc":   row.get("current_price_btc"),
              "current_ask_btc":     row.get("current_ask_btc"),
              "current_bid_btc":     row.get("current_bid_btc"),
              "entry_iv_pct":        row.get("entry_iv_pct"),
              "current_iv_pct":      row.get("current_iv_pct"),
              "pnl_option_usd":      row.get("pnl_option_usd"),
              "pnl_hedge_usd":       row.get("pnl_hedge_usd"),
              "total_pnl_usd":       row.get("total_pnl_usd"),
              "pnl_pct_of_premium":  row.get("pnl_pct_of_premium"),
              "tte_days":            row.get("tte_days"),
              "live_delta":           row.get("live_delta"),
              "live_gamma":           row.get("live_gamma"),
              "live_vega":            row.get("live_vega"),
              "hedge_qty":            row.get("hedge_qty"),
              "hedge_delta_drift":    row.get("hedge_delta_drift"),
              "hedge_threshold_pct":  row.get("hedge_threshold_pct"),
              "hedge_threshold_btc":  row.get("hedge_threshold_btc"),
              "theta_daily_now_usd": row.get("theta_daily_now_usd"),
              "theta_theory_usd":    row.get("theta_theory_usd"),
              "vrp_capture_pct":     row.get("vrp_capture_pct"),
          }
          Path("pnl_summary.json").write_text(json.dumps(summary, indent=2))
          print("pnl_summary.json ecrit.")
          EOF
          git add pnl_summary.json positions.json docs/index.html 2>/dev/null || git add pnl_summary.json docs/index.html
          git diff --cached --quiet || git commit -m "chore: pnl snapshot $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Push pnl_summary.json vers le Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python - <<'EOF'
          import requests, json, os, glob
          from pathlib import Path
          from datetime import datetime, timezone

          # Lire le dernier snapshot CSV généré
          snapshots = sorted(glob.glob("output/pnl_snap_*.csv"))
          summary = {"generated_at": datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")}

          if snapshots:
              import csv
              with open(snapshots[-1]) as f:
                  row = list(csv.DictReader(f))[0]
              summary.update({
                  "timestamp":           row.get("timestamp"),
                  "days_held":           row.get("days_held"),
                  # Spot
                  "spot":                row.get("spot"),
                  "entry_spot":          row.get("entry_spot"),
                  "spot_move_pct":       row.get("spot_move_pct"),
                  # Option prix
                  "entry_price_btc":     row.get("entry_price_btc"),
                  "current_price_btc":   row.get("current_price_btc"),   # mark
                  "current_ask_btc":     row.get("current_ask_btc"),
                  "current_bid_btc":     row.get("current_bid_btc"),
                  # IV
                  "entry_iv_pct":        row.get("entry_iv_pct"),
                  "current_iv_pct":      row.get("current_iv_pct"),
                  # PnL composants
                  "pnl_option_usd":      row.get("pnl_option_usd"),
                  "pnl_hedge_usd":       row.get("pnl_hedge_usd"),
                  "total_pnl_usd":       row.get("total_pnl_usd"),
                  "pnl_pct_of_premium":  row.get("pnl_pct_of_premium"),
                  # Greeks live
                  "tte_days":            row.get("tte_days"),
                  "live_delta":           row.get("live_delta"),
                  "live_gamma":           row.get("live_gamma"),
                  "live_vega":            row.get("live_vega"),
                  "hedge_qty":            row.get("hedge_qty"),
                  "hedge_threshold_pct":  row.get("hedge_threshold_pct"),
                  "hedge_threshold_btc":  row.get("hedge_threshold_btc"),
                  "hedge_delta_drift":   row.get("hedge_delta_drift"),
                  "theta_daily_now_usd": row.get("theta_daily_now_usd"),
                  "theta_theory_usd":    row.get("theta_theory_usd"),
                  "vrp_capture_pct":     row.get("vrp_capture_pct"),
              })

          # Lire positions.json mis à jour
          positions = json.loads(Path("positions.json").read_text())

          # Push les deux fichiers vers le Gist
          token   = os.environ["GIST_TOKEN"]
          gist_id = os.environ["GIST_ID"]

          r = requests.patch(
              f"https://api.github.com/gists/{gist_id}",
              headers={"Authorization": f"token {token}", "Accept": "application/vnd.github+json"},
              json={"files": {
                  "positions.json":   {"content": json.dumps(positions, indent=2, default=str)},
                  "pnl_summary.json": {"content": json.dumps(summary,   indent=2)},
              }},
              timeout=10
          )
          print(f"Gist push: {r.status_code}")
          print(json.dumps(summary, indent=2))
          EOF
